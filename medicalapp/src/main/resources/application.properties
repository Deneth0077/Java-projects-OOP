# application.properties
#
# Configuration file for the Medical Appointment System.
# Sets up the server port, database connection, and security credentials.
#
# OOP Concepts Applied:
# - Abstraction: Database connection details are abstracted away from the code logic.
#
# Component: System Configuration
# Layer: Application Properties
#
# @author Antigravity
# @version 1.0
# @since 2024

# SERVER CONFIGURATION
server.port=8080

# DATABASE CONFIGURATION (H2 In-Memory)
# ABSTRACTION: Using H2 abstractions for rapid development without external DB setup
spring.datasource.url=jdbc:h2:mem:medicaldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA CONFIGURATION
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# SECURITY CONFIGURATION (In-Memory for simplicity in dev)
# ENCAPSULATION: Basic credentials to gate access to the system
spring.security.user.name=admin
spring.security.user.password=admin123
